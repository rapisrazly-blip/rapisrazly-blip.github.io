<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  }

  .banner {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(145deg, #1a3a2a 0%, #2d6a4f 40%, #40916c 70%, #52b788 100%);
    overflow: hidden;
  }

  /* 背景装飾：大きな円 */
  .circle-bg {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
    background: #fff;
  }
  .circle-bg.c1 { width: 700px; height: 700px; top: -200px; right: -150px; }
  .circle-bg.c2 { width: 400px; height: 400px; bottom: -100px; left: -80px; }
  .circle-bg.c3 { width: 200px; height: 200px; top: 300px; left: 50px; }

  /* オレンジ帯（アクセント） */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 420px;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #f4a261, #e76f51, transparent);
    opacity: 0.8;
  }

  /* 葉っぱ装飾 */
  .leaf {
    position: absolute;
    width: 80px;
    height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50% 10% 50% 10%;
    transform: rotate(-30deg);
  }
  .leaf.l1 { bottom: 80px; right: 60px; width: 100px; height: 160px; transform: rotate(20deg); }
  .leaf.l2 { bottom: 200px; right: 120px; width: 60px; height: 100px; transform: rotate(50deg); opacity: 0.06; }
  .leaf.l3 { top: 60px; left: 40px; width: 70px; height: 110px; transform: rotate(-50deg); }

  /* コンテンツ */
  .content {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    padding: 90px 90px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top-section { }

  .tag {
    display: inline-block;
    background: #f4a261;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 10px 28px;
    border-radius: 40px;
    margin-bottom: 50px;
  }

  .main-copy {
    color: #fff;
    font-size: 74px;
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: 0.04em;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    margin-bottom: 32px;
  }

  .main-copy span {
    color: #b7e4c7;
  }

  .sub-copy {
    color: rgba(255,255,255,0.85);
    font-size: 32px;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: 0.06em;
    border-left: 4px solid #f4a261;
    padding-left: 24px;
  }

  .bottom-section {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .cta-btn {
    background: #f4a261;
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    padding: 22px 56px;
    border-radius: 60px;
    letter-spacing: 0.1em;
    box-shadow: 0 8px 30px rgba(244,162,97,0.5);
  }

  .bottom-note {
    text-align: right;
    color: rgba(255,255,255,0.5);
    font-size: 22px;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  /* 稲穂イメージ：CSS装飾 */
  .grain-cluster {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 280px;
    height: 320px;
    opacity: 0.15;
  }
  .grain-cluster::before,
  .grain-cluster::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50% 50% 50% 10%;
  }
  .grain-cluster::before {
    width: 40px; height: 70px;
    bottom: 40px; right: 80px;
    transform: rotate(-15deg);
  }
  .grain-cluster::after {
    width: 40px; height: 70px;
    bottom: 60px; right: 130px;
    transform: rotate(-25deg);
  }

  /* 区切りドット */
  .dots {
    position: absolute;
    top: 80px;
    right: 90px;
    display: grid;
    grid-template-columns: repeat(4, 14px);
    gap: 10px;
  }
  .dots span {
    width: 14px;
    height: 14px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: block;
  }
</style>
</head>
<body>
<div class="banner">
  <!-- 背景装飾 -->
  <div class="circle-bg c1"></div>
  <div class="circle-bg c2"></div>
  <div class="circle-bg c3"></div>
  <div class="accent-bar"></div>
  <div class="leaf l1"></div>
  <div class="leaf l2"></div>
  <div class="leaf l3"></div>
  <div class="grain-cluster"></div>

  <!-- ドット装飾 -->
  <div class="dots">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- メインコンテンツ -->
  <div class="content">
    <div class="top-section">
      <div class="tag">🌾 農業活性化プロジェクト</div>
      <div class="main-copy">
        地域の農業で、<br>
        <span>みんなの未来を</span><br>
        豊かに。
      </div>
      <div class="sub-copy">
        地元の農家を応援し、<br>
        地域をもっと元気にしよう。
      </div>
    </div>
    <div class="bottom-section">
      <div class="cta-btn">詳しく見る →</div>
      <div class="bottom-note">
        #農業活性化<br>
        #地域振興
      </div>
    </div>
  </div>
</div>
</body>
</html>
